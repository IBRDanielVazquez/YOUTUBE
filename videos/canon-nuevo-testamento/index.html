<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La evolución del Canon del Nuevo Testamento</title>
  <!-- Google Fonts para tipografía premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    /* Estilos base del lienzo del video (1920x1080) */
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0c10;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: #0b0c10;
    }

    /* Ocultar clips por defecto. El motor de HyperFrames los mostrará usando data-start y data-duration */
    .clip {
      display: none;
    }

    /* Ajuste de todos los clips visuales para llenar la pantalla */
    video.clip, img.clip {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Animaciones CSS premium */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translate(-50%, calc(-50% + 40px));
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    /* Superposiciones de Texto (Lower Thirds y Títulos Centrales) con Glassmorphism */
    .overlay-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: rgba(11, 12, 16, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 80px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    .overlay-title h1 {
      margin: 0;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .overlay-title p {
      margin: 15px 0 0 0;
      font-size: 28px;
      font-weight: 300;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* Clases de animación aplicadas a los textos */
    .animate-in {
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-out {
      animation: fadeOut 0.8s ease forwards;
    }
  </style>
</head>
<body>

  <!-- Contenedor principal de HyperFrames -->
  <div data-hf-id="hf-tvpd" id="root" data-composition-id="canon-nt" data-width="1920" data-height="1080" data-start="0" data-duration="20">

    <!-- ========================================== -->
    <!-- ESCENA 1: EL MITO DE NICEA (0s - 7s)       -->
    <!-- ========================================== -->
    
    <!-- Video de fondo (Nicea dolly-in) -->
    <video data-hf-id="hf-pmtf" id="scene-1-video" class="clip" data-start="0" data-duration="7" data-track-index="0" src="assets/plano1_nicea_dolly_in.mp4" muted playsinline>
    </video>

    <!-- Overlay de texto para Escena 1 -->
    <div data-hf-id="hf-v7e5" id="scene-1-text" class="clip overlay-title animate-in" data-start="1" data-duration="5" data-track-index="1">
      <h1 data-hf-id="hf-pckt">NICEA, 325 d.C.</h1>
      <p data-hf-id="hf-85fg">El Concilio Equivocado</p>
    </div>


    <!-- ========================================== -->
    <!-- ESCENA 2: TARJETA DE TEXTO (7s - 12s)      -->
    <!-- ========================================== -->
    
    <!-- Imagen de fondo de la tarjeta de texto -->
    <img data-hf-id="hf-wtwa" id="scene-2-bg" class="clip" data-start="7" data-duration="5" data-track-index="0" src="assets/plano2_tarjeta_texto.png">

    <!-- Overlay de texto principal sobre la tarjeta -->
    <div data-hf-id="hf-ulju" id="scene-2-text" class="clip overlay-title animate-in" data-start="7.5" data-duration="4" data-track-index="1" style="width: 1200px; padding: 50px 30px;">
      <h1 data-hf-id="hf-xa5d" style="font-size: 56px; line-height: 1.2;">¿QUÉ LIBROS IBAN EN TU BIBLIA?</h1>
      <p data-hf-id="hf-qtfy" style="color: #f43f5e;">LO QUE EL CONCILIO NO DEBATIÓ</p>
    </div>


    <!-- ========================================== -->
    <!-- ESCENA 3: SALA DE ARCHIVO (12s - 20s)      -->
    <!-- ========================================== -->
    
    <!-- Video de la sala de archivo (travelling cenital) -->
    <video data-hf-id="hf-2jg4" id="scene-3-video" class="clip" data-start="12" data-duration="8" data-track-index="0" src="assets/plano3_archivo_video.mp4" muted playsinline>
    </video>

    <!-- Overlay de texto sobre el manuscrito de archivo -->
    <div data-hf-id="hf-5et7" id="scene-3-text" class="clip overlay-title animate-in" data-start="13" data-duration="6" data-track-index="1">
      <h1 data-hf-id="hf-zgp0">EL EXPEDIENTE</h1>
      <p data-hf-id="hf-9nwx">Evidencia y Criterio de Selección</p>
    </div>

  </div>

</body>
</html>
